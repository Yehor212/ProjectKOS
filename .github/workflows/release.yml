name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v6
        with:
          configurationJson: |
            {
              "categories": [
                {"title": "🎮 New Games", "labels": ["new-game"]},
                {"title": "🎯 Gameplay", "labels": ["gameplay"]},
                {"title": "🐛 Bug Fixes", "labels": ["bug"]},
                {"title": "🎨 UI/UX", "labels": ["ui"]},
                {"title": "🔊 Audio", "labels": ["audio"]},
                {"title": "⚡ Performance", "labels": ["performance"]},
                {"title": "🔒 Safety", "labels": ["safety"]}
              ]
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download AAB artifact
        uses: actions/download-artifact@v4
        with:
          name: android-aab-${{ github.ref_name }}
          path: build/
        continue-on-error: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.changelog }}
          files: build/game.aab
          draft: false
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
