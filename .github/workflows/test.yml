name: Run Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Godot
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.6.1-stable/Godot_v4.6.1-stable_linux.x86_64.zip
          unzip -q Godot_v4.6.1-stable_linux.x86_64.zip
          mv Godot_v4.6.1-stable_linux.x86_64 /usr/local/bin/godot
          chmod +x /usr/local/bin/godot

      - name: Run tests
        working-directory: game
        run: |
          godot --headless -s tests/run_all_tests.gd --quit-after 30
